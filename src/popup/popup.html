<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <div class="scout-wordmark">scout</div>
    <div class="scout-sublabel">youtube → shopping list</div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab tab--active" id="tab-list" role="tab"
            aria-selected="true" aria-controls="panel-list">
      Shopping list
    </button>
    <button class="tab" id="tab-settings" role="tab"
            aria-selected="false" aria-controls="panel-settings">
      Settings
    </button>
  </nav>

  <main>
    <!-- Shopping List panel -->
    <section id="panel-list" class="panel" role="tabpanel" aria-labelledby="tab-list">
      <div id="pending-section" hidden></div>
      <div id="list"></div>
    </section>

    <!-- Settings panel -->
    <section id="panel-settings" class="panel" role="tabpanel"
             aria-labelledby="tab-settings" hidden>
      <div class="settings-panel">
        <form class="settings-form" id="settings-form" autocomplete="off">

          <div class="field-group">
            <div class="field-label">Provider</div>
            <div class="provider-picker" id="provider-picker" role="group" aria-label="Select provider">
              <button type="button" class="provider-btn" data-provider="none">None</button>
              <button type="button" class="provider-btn" data-provider="gemini">Gemini</button>
              <button type="button" class="provider-btn" data-provider="openrouter">OpenRouter</button>
              <button type="button" class="provider-btn" data-provider="openai">OpenAI</button>
            </div>
            <p class="field-hint" id="provider-hint"></p>
          </div>

          <div class="field-group" id="key-group" hidden>
            <label class="field-label" for="api-key" id="key-label">API Key</label>
            <input type="password" id="api-key" class="field-input" spellcheck="false" />
            <p class="field-hint" id="key-hint"></p>
          </div>

          <div class="field-group" id="model-group" hidden>
            <label class="field-label" for="model-input">
              Model <span class="field-optional">(optional)</span>
            </label>
            <input type="text" id="model-input" class="field-input" spellcheck="false" />
            <p class="field-hint">Leave blank to use the default model.</p>
          </div>

          <button type="submit" id="save-key" class="btn-primary">Save</button>
          <p id="save-status" class="save-status" aria-live="polite"></p>

        </form>
      </div>
    </section>
  </main>

  <script src="../lib/types.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="../lib/messaging.js"></script>
  <script src="popup.js"></script>
</body>
</html>
