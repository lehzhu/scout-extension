<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Scout — saves</title>
  <link rel="stylesheet" href="page.css" />
</head>
<body>
  <section id="list-view" class="view">
    <header class="page-header">
      <div class="page-header__brand">
        <a href="#" class="scout-wordmark scout-home-link" data-home-link>Scout</a>
      </div>
      <div class="header-actions">
        <button id="open-favourites-btn" class="btn-ghost" type="button">Favourites ♥</button>
        <button id="export-json-btn" type="button" class="btn-ghost">Export JSON</button>
        <button id="export-csv-btn" type="button" class="btn-ghost">Export CSV</button>
      </div>
    </header>

    <div class="page-body">
      <div class="toolbar">
        <input id="search-input" type="search" placeholder="Search videos, channels, products…" />
        <div id="filter-bar" class="filter-bar"></div>
        <button id="clear-all-btn" type="button" class="btn-ghost btn-ghost--danger">Clear all</button>
      </div>

      <div id="grid" class="grid"></div>

      <div id="empty-state" class="empty-state" hidden>
        <div class="empty-state__heading">No saves yet</div>
        <div class="empty-state__hint">Save a YouTube video to get started.</div>
      </div>
    </div>
  </section>

  <section id="detail-view" class="view" hidden>
    <header class="page-header">
      <div class="page-header__brand">
        <a href="#" class="scout-wordmark scout-home-link" data-home-link>Scout</a>
      </div>
      <div class="header-actions">
        <button type="button" id="prev-video-btn" class="btn-ghost">← Prev</button>
        <button type="button" id="next-video-btn" class="btn-ghost">Next →</button>
      </div>
    </header>
    <div class="page-body detail-body">
      <div class="detail-nav">
        <a id="back-link" class="back-link" href="#">← All saves</a>
        <button type="button" id="delete-save-btn" class="btn-ghost btn-ghost--danger">Delete save</button>
      </div>

      <div class="detail-layout">
        <div class="detail-left">
          <a id="video-preview" class="video-preview" target="_blank" rel="noopener noreferrer">
            <img id="video-thumb" alt="" referrerpolicy="no-referrer" />
            <span class="video-play-overlay" aria-hidden="true">
              <span class="video-play-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </span>
              <span class="video-play-label">Watch on YouTube</span>
            </span>
          </a>

          <div class="video-info">
            <h1 id="video-title"></h1>
            <a id="video-channel-link" class="video-channel-link" target="_blank" rel="noopener noreferrer"></a>
          </div>

          <div class="notes-block">
            <div class="notes-block__head">
              <label for="notes-input">Notes</label>
              <span id="notes-status" class="notes-status"></span>
            </div>
            <textarea id="notes-input" placeholder="Your thoughts, sizes, links, reminders…"></textarea>
          </div>

          <section id="video-description-block" class="info-block" hidden>
            <div class="info-block__head">Description</div>
            <div id="video-description" class="info-block__body"></div>
            <button type="button" id="video-description-toggle" class="info-block__toggle" hidden></button>
          </section>

          <section id="video-comments-block" class="info-block" hidden>
            <div class="info-block__head">
              Top comments <span id="video-comments-count" class="info-block__count"></span>
            </div>
            <ul id="video-comments" class="info-block__comments"></ul>
          </section>

          <div id="video-metadata" class="metadata-block"></div>
        </div>

        <div class="detail-right">
          <div class="products-header">
            <div class="products-header__title">
              <h2>Products</h2>
              <span id="products-count" class="products-count"></span>
            </div>
            <div id="detail-filter-bar" class="filter-bar"></div>
          </div>

          <div id="products-list" class="products-list"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="favourites-view" class="view" hidden>
    <header class="page-header">
      <div class="page-header__brand">
        <a href="#" class="scout-wordmark scout-home-link" data-home-link>Scout</a>
        <span class="scout-sublabel">Favourites</span>
      </div>
      <div class="header-actions">
        <a class="btn-ghost" id="fav-back-link" href="#">← All saves</a>
      </div>
    </header>
    <div class="page-body">
      <div id="favourites-groups"></div>
      <div id="favourites-empty" class="empty-state" hidden>
        <div class="empty-state__heading">No favourites yet</div>
        <div class="empty-state__hint">Tap the heart on any product to save it here.</div>
      </div>
    </div>
  </section>

  <script src="../lib/types.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="../lib/messaging.js"></script>
  <script src="page.js"></script>
</body>
</html>
